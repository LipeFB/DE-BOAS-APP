<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="/css/estatisticas.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda+SC:ital,opsz,wght@0,6..96,400..900;1,6..96,400..900&family=Corben:wght@400;700&display=swap" rel="stylesheet">
  
</head>
<body>
  
  <header class="header-stats">
    <a href="objetivos.html" class="voltar"><img src="/img/botao-fechar.png"></a>
    <div class="avatar-animado"><img src="/img/estatistica.png" class="avatar-animado"></div>
    <p class="minhas-estats">Minhas Estatisticas</p>
  </header>


  <div class="bloco-dado">
    <div class="titulo-dado"><img src="/img/checkbox.png" class="icone-dado">Meditacoes Realizadas</div>
    <div class="caixa-valor">
      <span class="numero-gigante" clas="numero-meditacoes">3</span> <span class="texto-caixa">SESSOES</span>
    </div>
  </div>

  <div class="bloco-dado">
    <div class="titulo-dado"><img src="/img/relogio.png" class="icone-dado">Tempo Total Meditando</div>
    <div class="caixa-valor">
      <span class="numero-gigante">30h45</span>
    </div>
  </div>

  <div class="bloco-dado">
    <div class="titulo-dado"><img src="/img/alvo.png" class="icone-dado">Objetivo Mais Utilizado</div>
    <div class="caixa-valor">
      <span class="texto-caixa">NOME DO<br>OBJETIVO</span>
    </div>
  </div>


</body>
</html>
